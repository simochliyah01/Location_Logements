{% extends 'base.html' %}
{% block title %}Supprimer{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 text-center">
            <i class="fas fa-exclamation-triangle fa-4x text-danger mb-3"></i>
            <h4>Confirmer la suppression</h4>
            <p>Voulez-vous vraiment supprimer <strong>{{ logement.titre }}</strong> ?</p>
            <form method="POST">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger me-2">
                    <i class="fas fa-trash"></i> Oui, supprimer
                </button>
                <a href="{% url 'logement_detail' logement.pk %}" class="btn btn-outline-secondary">Annuler</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
